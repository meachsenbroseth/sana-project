providers = ["php"]

[phases.setup]
# Upgraded to PHP 8.4 to match your composer.lock!
nixPkgs = [
    "php84",
    "php84Packages.composer",
    "php84Extensions.intl",
    "php84Extensions.zip",
    "php84Extensions.pdo_mysql",
    "php84Extensions.mbstring",
    "nodejs_20"
]

[phases.build]
cmds = [
    "composer install --optimize-autoloader --no-dev --no-interaction",
    "npm install",
    "npm run build"
]