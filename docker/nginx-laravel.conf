server {
    listen __PORT__;
    server_name _;

    root /var/www/html/public;

    index index.php index.html;

    charset utf-8;

    # Security: deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Security: deny access to sensitive files
    location ~ (\.env|\.git|composer\.(json|lock|phar)|artisan|storage/logs) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Security: deny access to backup/config files
    location ~ (~$|\.(bak|conf|dist|fla|inc|ini|log|psd|sh|sql|swp|old)) {
        deny all;
    }

    # Serve static files directly with aggressive caching
    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location /storage/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    location /fonts/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /images/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    location /css/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    location /js/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Favicon and robots
    location = /favicon.ico {
        access_log off;
        log_not_found off;
        expires 1y;
    }

    location = /robots.txt {
        access_log off;
        log_not_found off;
    }

    # Laravel health check
    location /up {
        access_log off;
        try_files $uri /index.php?$query_string;
    }

    # Main request handling
    location / {
        try_files $uri $uri/ /index.php?$query_string;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # PHP-FPM passthrough
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_param APP_ENV production;
        include fastcgi_params;

        # FastCGI buffer settings
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_busy_buffers_size 64k;
        fastcgi_temp_file_write_size 256k;
        fastcgi_connect_timeout 30;
        fastcgi_send_timeout 60;
        fastcgi_read_timeout 60;

        # Security headers for PHP responses
        fastcgi_param HTTP_X_FORWARDED_PROTO https;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }

    # Deny access to other PHP files in storage
    location ~ ^/storage/.*\.php$ {
        deny all;
        return 403;
    }

    # Error pages
    error_page 404 /index.php;
    error_page 500 502 503 504 /index.php;
}
