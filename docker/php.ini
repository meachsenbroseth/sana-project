[PHP]
engine = On
short_open_tag = Off
precision = 14
output_buffering = 4096
zlib.output_compression = Off
implicit_flush = Off
unserialize_max_depth = 4096
serialize_precision = -1
disable_functions = pcntl_alarm,pcntl_fork,pcntl_signal,pcntl_signal_dispatch,pcntl_get_signals,pcntl_signal_get_handler,pcntl_async_signals,exec,passthru,shell_exec,system,proc_open,popen,curl_multi_exec,parse_ini_file,show_source
disable_classes = ""
zend.enable_gc = On
expose_php = Off
max_execution_time = 300
max_input_time = 60
memory_limit = 256M
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
display_errors = Off
display_startup_errors = Off
log_errors = On
log_errors_max_len = 1024
ignore_repeated_errors = Off
ignore_repeated_source = Off
report_memleaks = On
html_errors = Off
error_log = /var/log/php/error.log
post_max_size = 50M
upload_max_filesize = 50M
max_file_uploads = 20
default_charset = UTF-8
file_uploads = On
allow_url_fopen = On
allow_url_include = Off
default_socket_timeout = 60
date.timezone = UTC
pdo_mysql.cache_size = 2000
mysqlnd.collect_statistics = Off
mysqlnd.collect_memory_statistics = Off

[Session]
session.use_strict_mode = 1
session.use_cookies = 1
session.use_only_cookies = 1
session.name = phanna_session
session.auto_start = Off
session.serialize_handler = php_serialize
session.gc_probability = 0
session.gc_divisor = 1000
session.gc_maxlifetime = 7200
session.cookie_lifetime = 0
session.cookie_path = /
session.cookie_domain =
session.cookie_httponly = 1
session.cookie_secure = 1
session.cookie_samesite = Lax
session.cache_limiter = nocache

[opcache]
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.max_wasted_percentage = 5
opcache.use_cwd = 1
opcache.validate_timestamps = 0
opcache.revalidate_freq = 0
opcache.revalidate_path = 0
opcache.save_comments = 1
opcache.quick_shutdown = 1
opcache.enable_file_override = 1
opcache.optimization_level = 0x7FFFBFFF
opcache.dups_fix = 1
opcache.blacklist_filename = /etc/php/opcache-blacklist.txt
opcache.file_cache = /tmp/opcache
opcache.file_cache_only = 0
opcache.file_cache_consistency_checks = 0
opcache.max_file_size = 0
opcache.jit = tracing
opcache.jit_buffer_size = 100M
opcache.jit_blacklist_root_trace = 16
opcache.jit_blacklist_side_trace = 8
opcache.jit_hot_loop = 64
opcache.jit_hot_func = 10
opcache.jit_hot_return = 8
opcache.jit_hot_side_exit = 8
opcache.jit_max_root_traces = 8192
opcache.jit_max_side_traces = 8192
opcache.jit_max_exit_counters = 8192
opcache.jit_max_loop_count = 64
opcache.jit_trigger_gc_threshold = 0.25
opcache.jit_max_recursive_calls = 128
opcache.jit_max_recursive_return_calls = 64
opcache.jit_max_recursive_side_exits = 8

[JIT]
pcre.jit = 1

[Pdo_Pgsql]
pgsql.auto_reset_persistent = Off

[Assert]
zend.assertions = -1

[CLI Server]
cli_server.color = On
